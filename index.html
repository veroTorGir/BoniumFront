<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center py-4">
    <div id="login" class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

                <div class="text-center mb-4" style="position:relative;z-index:1;">
                    <div class="d-inline-flex align-items-center justify-content-center bg-white rounded-circle shadow-lg mb-2" style="width:68px;height:68px;">
                        <span style="font-size:2rem;font-weight:900;background:linear-gradient(135deg,#0b3d91,#00a884);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">B</span>
                    </div>
                    <p class="text-white fw-bold fs-4 mb-0" style="text-shadow:0 1px 8px rgba(0,0,0,0.25);">Bonium</p>
                </div>

                <form id="loginForm" action="login" class="card shadow-lg border-0 p-4 p-md-5">
                    <h1 class="h5 text-center text-secondary fw-normal mb-4">Inicia sesión en tu cuenta</h1>

                    <div class="mb-3">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input id="username" type="text" name="username" placeholder="Usuario" class="form-control" required autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input id="password" type="password" name="password" placeholder="Contraseña" class="form-control" required autocomplete="current-password">
                        </div>
                    </div>

                    <p id="loginMessage" class="small mb-3 text-center"></p>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-brand btn-lg">Ingresar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
